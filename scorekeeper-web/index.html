<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Choke Ledger</title>
  <link rel="stylesheet" href="styles.css?v=0.2.4">
</head>
<body>
  <div class="app">
    <header><h1>Choke Ledger</h1></header>
    <div id="topCenter" style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:12px;padding-bottom:8px">
      <div style="display:flex;gap:18px;align-items:center;">
        <div id="totalMisses" style="font-weight:700">Total missed shots: 0</div>
        <div id="totalAmount" style="font-weight:700">Total amount: $0</div>
      </div>
      <div class="addRow" style="width:100%;max-width:720px;display:flex;gap:8px;align-items:center;justify-content:center">
        <input id="nameInput" placeholder="Player name" style="flex:1;padding:12px;border-radius:8px;border:1px solid #bfdbfe" />
        <input id="skillInput" type="number" min="1" max="9" placeholder="Skill (1-9)" style="width:120px;margin-left:8px;padding:12px;border-radius:8px;border:1px solid #bfdbfe" />
        <button id="addBtn">Add</button>
      </div>
      <div style="display:flex;gap:16px;align-items:center;margin-top:8px;padding-bottom:12px">
        <div style="width:100%;max-width:360px;height:160px;text-align:center"><div style="font-weight:600;margin-bottom:6px">Missed Shots</div><canvas id="chartMisses" width="360" height="160"></canvas></div>
        <div style="width:100%;max-width:360px;height:160px;text-align:center"><div style="font-weight:600;margin-bottom:6px">Dollar Amount</div><canvas id="chartAmount" width="360" height="160"></canvas></div>
      </div>
    </div>
    <main>
      <!-- addRow moved to topCenter to avoid overlapping charts -->
      <ul id="list" class="list"></ul>
      <div class="footer"></div>
      <div id="status" class="status">Status: initializing...</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="config.js"></script>
  <script src="app-v4.js"></script>
</body>
</html>
